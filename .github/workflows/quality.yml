name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.16"
      - name: Validate repository
        run: python scripts/validate_repository.py
      - name: Lint Python
        run: uvx ruff==0.15.22 check --no-cache agents crewai_mcp_course scripts
      - name: Resolve Python dependencies
        run: python scripts/check_dependencies.py
      - name: Smoke project imports and CLIs
        run: python scripts/smoke_projects.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=low

  dependency-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.16"
      - run: python scripts/check_dependencies.py
