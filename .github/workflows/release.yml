name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create source archives
        run: |
          git archive --format=zip --output="ai-agents-atlas-${GITHUB_REF_NAME}.zip" HEAD
          git archive --format=tar.gz --output="ai-agents-atlas-${GITHUB_REF_NAME}.tar.gz" HEAD
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "ai-agents-atlas-${GITHUB_REF_NAME}.zip" \
            "ai-agents-atlas-${GITHUB_REF_NAME}.tar.gz" \
            --generate-notes
